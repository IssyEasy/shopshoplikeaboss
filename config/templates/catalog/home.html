{% extends "base.html" %}
{% block title %}Главная{% endblock %}
{% block content %}
<h1>Категории</h1>

{% if categories %}
<div class="product-grid">
  {% for c in categories %}
  <div class="product-card">
    <a href="{% url 'catalog:product_list_by_category' c.slug %}">
      <h3>{{ c.name }}</h3>
    </a>
  </div>
  {% endfor %}
</div>
{% else %}
<p>Категории пока не добавлены.</p>
{% endif %}
{% endblock %}
