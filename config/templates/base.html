<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Shop{% endblock %}</title>
</head>
<body>
<header>
  <a href="{% url 'catalog:home' %}">Магазин</a> |
  <a href="{% url 'catalog:category_list' %}">Категории</a> |
  <!-- Глобальная кнопка корзины -->
  <a href="{% url 'catalog:cart_detail' %}">🛒 Корзина</a>
  <hr>
  {% if not request.user.is_authenticated %}
  <a href="{% url 'login' %}">Войти</a> /
  <a href="{% url 'register' %}">Регистрация</a>
{% else %}
  Привет, {{ request.user.username }} /
  <form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Выйти</button>
  </form> /
  <a href="{% url 'my_orders' %}">Мои заказы</a>
{% endif %}
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  <hr>
  <small>ENU College • Django Shop</small>
</footer>
</body>
</html>
