{% extends "base.html" %}

{% block content %}
<h2>Профиль пользователя</h2>

<form method="post">
    {% csrf_token %}
    <p>
        <label>Имя пользователя: </label>
        <input type="text" value="{{ request.user.username }}" disabled>
    </p>
    <p>
        <label>Email: </label>
        <input type="email" name="email" value="{{ request.user.email }}">
    </p>
    <button type="submit">Сохранить</button>
</form>
{% endblock %}
